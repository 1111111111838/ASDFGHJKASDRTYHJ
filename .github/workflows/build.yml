name: Build Android Native APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # מייצרים Wrapper תואם לגרסה יציבה ומודרנית
      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.7

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      # פקודה חכמה שמתקנת אוטומטית את גרסת פלאגין הקומפוז השגויה במידה וקיימת בקובץ
      - name: Fix Compose Plugin Version
        run: |
          sed -i "s/id(\"org.jetbrains.kotlin.plugin.compose\").version(\"1.9.23\")/id(\"org.jetbrains.kotlin.plugin.compose\").version(\"2.0.0\")/g" build.gradle.kts || true
          sed -i "s/id 'org.jetbrains.kotlin.plugin.compose' version '1.9.23'/id 'org.jetbrains.kotlin.plugin.compose' version '2.0.0'/g" build.gradle.kts || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: file-explorer-apk
          path: app/build/outputs/apk/debug/app-debug.apk
