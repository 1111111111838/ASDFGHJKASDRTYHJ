name: Build Android Native APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4' # מגדיר גרסת Gradle מובנית ישירות בענן

      - name: Build with Global Gradle
        run: gradle assembleDebug # מריץ את הקימפול באמצעות Gradle הגלובלי ולא דרך gradlew החסר

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: file-explorer-apk
          path: app/build/outputs/apk/debug/app-debug.apk
