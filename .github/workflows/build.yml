name: Build Android Native APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      # הסרת שורת הפלאגין הבעייתי מהקובץ הראשי כדי למנוע את קריסת הסנכרון
      - name: Remove Broken Compose Plugin
        run: |
          sed -i '/org.jetbrains.kotlin.plugin.compose/d' build.gradle.kts || true
          sed -i '/org.jetbrains.kotlin.plugin.compose/d' app/build.gradle.kts || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: file-explorer-apk
          path: app/build/outputs/apk/debug/app-debug.apk
