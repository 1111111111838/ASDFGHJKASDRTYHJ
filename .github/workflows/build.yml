name: Build Android Native APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # שלב זה מייצר את קבצי ה-gradlew החסרים במאגר שלך באופן אוטומטי בענן
      - name: Generate Gradle Wrapper
        run: |
          npm install -g gradle-to-js || true # מונע שגיאות NPM
          gradle wrapper --gradle-version 8.4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true # מכבה את הקאש כדי למנוע את השגיאה שראית בלוג

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: file-explorer-apk
          path: app/build/outputs/apk/debug/app-debug.apk
