name: Build APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # מנקים באופן אגרסיבי את הפלאגין השבור מכל קובץ פנימי או חיצוני בפרויקט
      - name: Force Fix Android Project Structure
        run: |
          # ריקון הקובץ הראשי למניעת התנגשויות settings
          echo "" > build.gradle.kts

          # מחיקה טוטאלית של פלאגין הקומפוז השבור מכל קובץ הגדרות, בכל צורת כתיבה שהיא
          find . -name "*.gradle.kts" -type f -exec sed -i '/plugin.compose/d' {} + || true
          find . -name "*.gradle" -type f -exec sed -i '/plugin.compose/d' {} + || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # הגדרת גרסת גראדל תואמת
      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-disabled: true

      # יצירת ה-Wrapper
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Grant Execute Permissions
        run: chmod +x gradlew

      # קימפול ה-APK
      - name: Compile APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/debug/*.apk"
