name: Build APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # מרוקנים לחלוטין את הקובץ הראשי כדי שלא יתנגש עם הגדרות ה-settings של הפרויקט
      - name: Force Fix Android Project Structure
        run: |
          # יצירת קובץ ראשי ריק לחלוטין כדי למנוע את שגיאת ה-Settings Repositories
          echo "" > build.gradle.kts

          # ניקוי הפלאגין הבעייתי רק מהקובץ הפנימי של האפליקציה במידה והוא שם
          if [ -f app/build.gradle.kts ]; then
            sed -i '/org.jetbrains.kotlin.plugin.compose/d' app/build.gradle.kts || true
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # הגדרת גרסת גראדל תואמת
      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-disabled: true

      # יצירת ה-Wrapper
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Grant Execute Permissions
        run: chmod +x gradlew

      # קימפול ה-APK
      - name: Compile APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/debug/*.apk"
