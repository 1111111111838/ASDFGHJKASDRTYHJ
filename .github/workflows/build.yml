name: Build APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # הפקודה הזו סורקת את כל הפרויקט, מוצאת כל קובץ gradle ומוחקת ממנו את השורה הדפוקה
      - name: Nuclear Clean Broken Line
        run: |
          find . -name "*.gradle.kts" -type f -exec sed -i '/org.jetbrains.kotlin.plugin.compose/d' {} + || true
          find . -name "*.gradle" -type f -exec sed -i '/org.jetbrains.kotlin.plugin.compose/d' {} + || true

      - name: Build with Gradle
        run: |
          gradle assembleDebug --no-daemon
          
      - uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/debug/*.apk"
